<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Lite Clone</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">amazon<span>.lite</span></div>
    <input id="search" placeholder="Search products" />
    <button id="cartBtn">Cart (<span id="cartCount">0</span>)</button>
  </header>

  <main>
    <section class="hero">Big deals, low prices, fast UX.</section>
    <section id="grid" class="grid"></section>
  </main>

  <aside id="cart" class="cart hidden">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <p class="total">Total: $<span id="total">0.00</span></p>
    <button id="checkout">Checkout</button>
  </aside>

  <script src="app.js"></script>
</body>
</html>
